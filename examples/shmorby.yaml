# ── Required (no default) ──────────

# provider:  Choose one: ollama, openrouter, opencode_zen, openai
#            Default: ollama (no API key needed for local LLM)
#            If you pick openai/openrouter/opencode_zen, you
#            MUST set the corresponding api_key below.
provider: ollama

# ── Required for remote providers ───────────

# When provider is "openai", set your key here:
# openai:
#   api_key: sk-proj-...

# When provider is "openrouter", set your key here:
# openrouter:
#   api_key: sk-or-...

# When provider is "opencode_zen", set your key here:
# opencode_zen:
#   api_key: oz-...

# ── Optional (sensible defaults) ────────────

model: llama3.2

agent:
  default: operate          # operate | diagnose
  max_tool_iterations: 20
  shell: bash

ollama:
  base_url: http://127.0.0.1:11434

openai:
  base_url: ""
  organization: ""
  timeout: 120

scope:
  workdir: /home/admin/infra
  instructions:
    - ./SCOPE.md
    - ./runbooks/*.md

tui:
  enabled: true
  fullscreen: false
  theme: catppuccin-mocha
  history_size: 100
  glamour:
    enabled: true
  logging:
    enabled: true
    default_level: info
    max_entries: 100
    display_limit: 20
    collapse: true
    collapse_threshold: 5

memory:
  enabled: true
  db_path: ~/.local/share/shmorby/memory.db
  max_entries: 10000
  auto_capture: true
  embedding:
    provider: ollama
    model: nomic-embed-text

context:
  compression:
    enabled: true
    mode: auto
    threshold: 0.8
    max_tool_output_tokens: 4096
    summary_model: ""
    summary_provider: ""
    offload_to_memory: true
    min_messages_to_compress: 6
    fallback_context_window: 8192
  token_estimator: heuristic

models: {}

tools:
  shell:
    enabled: true
  sudo:
    enabled: false
  aws:
    enabled: false

permission:
  shell: ask
  ssh: ask
  sudo: ask
  aws: ask
  interactive: true
  session_overrides: true
  presets: []
  rules: []

provider: ollama          # REQUIRED — supported: ollama, openrouter, opencode_zen, openai
model: llama3.2           # REQUIRED — model name the provider understands

ollama:
  base_url: http://127.0.0.1:11434

# openrouter:
#   api_key: "${OPENROUTER_API_KEY}"

# opencode_zen:
#   api_key: "${OPENCODE_ZEN_API_KEY}"
#   base_url: "${OPENCODE_ZEN_BASE_URL}"

# openai:
#   api_key_env: OPENAI_API_KEY   # env var holding the key (default OPENAI_API_KEY)
#   base_url: ""                  # override for Azure or compatible endpoints
#   organization: ""              # optional org ID
#   timeout: 120                  # seconds, HTTP client timeout (default 120)

scope:
  workdir: /home/admin/infra
  instructions:
    - ./SCOPE.md
    # Use literal paths; glob expansion is not supported
    - ./runbooks/deploy.md

agent:
  default: operate             # operate | diagnose (default operate)
  max_tool_iterations: 20      # max tool-call rounds before summary (default 20)
  shell: bash                  # shell to use for shell tool (default bash)

tools:
  timeout: 120                 # default tool timeout in seconds (default 120)
  shell:
    enabled: true              # (default true)
  sudo:
    enabled: false             # (default false)
  aws:
    enabled: false             # (default false)

permission:
  shell: allow                 # allow | ask | deny (default allow)
  ssh: allow                   # allow | ask | deny (default allow)
  sudo: ask                    # allow | ask | deny (default ask)
  aws: ask                     # allow | ask | deny (default ask)
  # interactive: true          # enable TUI approval prompts
  # session_overrides: true    # allow "allow all like this" per session
  # presets:
  #   - destructive            # deny all destructive ops
  #   - service                # ask on service changes
  #   - user                   # ask on user management
  # rules:
  #   - match: "rm -rf /"
  #     action: deny
  #     reason: "destruction of root filesystem"
  #   - match: "aws ec2 terminate-instances *"
  #     action: deny
  #     reason: "instance termination"

# Model info overrides — used when provider API is unreachable or returns no
# context_length (e.g. OpencodeZen /v1/models omits the field).
models:
  llama3.2:
    context_window: 128000
    max_output_tokens: 4096

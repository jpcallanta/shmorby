memory:
  enabled: true
  db_path: ~/.local/share/shmorby/memory.db
  max_entries: 10000
  auto_capture: true
  embedding:
    provider: ollama          # ollama | openai | "" (disabled)
    model: nomic-embed-text   # embedding model name
    base_url: ""              # override for custom endpoints
  tags:
    - pattern: 'ssh\s+\S*@(\S+)'
      tag: "host:$1"
    - pattern: 'systemctl\s+(\S+)'
      tag: "service:$1"

context:
  token_estimator: heuristic
  enabled: true
  mode: auto          # auto|aggressive|conservative|off
  threshold: 0.8      # compression triggers when usage exceeds 80%
  max_tool_output_tokens: 4096
  max_tool_output_lines: 0         # 0 = unlimited
  max_tool_output_bytes: 0         # 0 = unlimited (was 64 KiB)
  min_messages_to_compress: 6
  fallback_context_window: 128000    # used when API + config provide no value
  offload_to_memory: true
  # summary_model: ""        # empty = use primary model
  # summary_provider: ""     # empty = use primary provider

tui:
  fullscreen: true
  theme: catppuccin-mocha
  glamour:
    enabled: true
  logging:
    enabled: true
    default_level: info        # debug, info, warn, error
    max_entries: 100           # max log entries kept in viewport ring buffer
    display_limit: 20          # max log entries shown when expanded
    collapse: true             # start collapsed
    collapse_threshold: 5      # auto-collapse when more than N log entries
  navigation:
    follow_mode: true
    scroll_lines_per_tick: 5
    leader_timeout: 2000       # ms to wait for second leader key
    history_size: 100          # input history ring buffer size
    scroll_acceleration:
      enabled: true
    # keybinds:                 # uncomment to override defaults
    #   leader: ctrl+x
    #   agent_cycle: tab
    #   agent_cycle_reverse: shift+tab
    #   command_list: ctrl+p
    #   history_search: ctrl+r
    # references:               # @-reference sources
    #   - alias: web
    #     path: /etc/nginx/sites-enabled/
